<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HockeySavant - Awards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="brand">
      <svg class="puck" viewBox="0 0 44 34" aria-hidden="true">
        <path d="M4 11 V23 A18 6 0 0 0 40 23 V11 Z" fill="#0a0807"/>
        <ellipse cx="22" cy="11" rx="18" ry="6" fill="#211c18" stroke="#5b5249" stroke-width="1.4"/>
        <path d="M4 11 V23 A18 6 0 0 0 40 23 V11" fill="none" stroke="#5b5249" stroke-width="1.4"/>
        <ellipse cx="22" cy="11" rx="11" ry="3.4" fill="none" stroke="#3a332d" stroke-width="1"/>
      </svg>
      <h1>HOCKEY<span class="accent">SAVANT</span></h1>
    </div>
    <nav class="nav">
      <a href="index.html">Players</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="awards.html" class="on">Awards</a>
      <a href="glossary.html">Glossary</a>
    </nav>
  </header>

  <main class="awards">
    <div class="awards-toolbar">
      <div>
        <h2 class="awards-title">Model Award Race</h2>
        <p class="awards-lead">The model's top five for each trophy, ranked by percentile profile.</p>
      </div>
      <label class="awards-season">Season
        <select id="award-season" class="season-select" aria-label="Season"></select>
      </label>
    </div>

    <div id="award-grid" class="award-grid"></div>

    <section id="award-history" class="award-history">
      <h3 class="award-history-head">Model Winners by Season</h3>
      <p class="award-history-lead">The model's top pick for each trophy, every season in the
        dataset. Click a name to open that player's card for that season.</p>
      <div class="award-history-scroll">
        <table id="award-history-table" class="award-history-table"></table>
      </div>
    </section>
  </main>

  <script src="awards.js"></script>
</body>
</html>
